<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Urban Beats - Kitchen and Family Bar</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background-color: #f8f9fa;
      scroll-behavior: smooth;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #222;
      padding: 1rem 2rem;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    .nav-links li a {
      color: white;
      text-decoration: none;
      font-size: 1rem;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4') no-repeat center center/cover;
      height: 90vh;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      margin: 0;
    }

    .hero p {
      font-size: 1.5rem;
      margin: 1rem 0;
    }

    .hero button {
      padding: 0.75rem 1.5rem;
      background-color: #ff4c60;
      border: none;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 5px;
    }

    .section {
      padding: 4rem 2rem;
      text-align: center;
    }

    .section h2 {
      font-size: 2rem;
      margin-bottom: 2rem;
    }

    .menu-items {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .item {
      background-color: white;
      border-radius: 8px;
      padding: 1rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 200px;
      transition: transform 0.3s;
    }

    .item:hover {
      transform: scale(1.05);
    }

    .item img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
    }

    .item h3 {
      margin: 1rem 0 0.5rem;
    }

    .slider {
      display: flex;
      overflow-x: auto;
      gap: 1rem;
      padding: 1rem;
      scroll-behavior: smooth;
    }

    .slide {
      min-width: 300px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    #scrollTopBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 1rem;
      background-color: #222;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 1.25rem;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Urban Beats</div>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#menu">Menu</a></li>
      <li><a href="#gallery">Gallery</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <section id="home" class="hero">
    <h1>Welcome to Urban Beats</h1>
    <p>Kitchen and Family Bar</p>
    <button onclick="scrollToSection('menu')">Explore Menu</button>
  </section>

  <section id="menu" class="section">
    <h2>Our Menu</h2>
    <div class="menu-items">
      <div class="item">
        <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="Burger">
        <h3>Classic Burger</h3>
        <p>$9.99</p>
      </div>
      <div class="item">
        <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" alt="Drink">
        <h3>Mocktail</h3>
        <p>$4.99</p>
      </div>
    </div>
  </section>

  <section id="gallery" class="section">
    <h2>Gallery</h2>
    <div class="slider">
      <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38" alt="slide1" class="slide">
    </div>
  </section>

  <section id="contact" class="section">
    <h2>Contact Us</h2>
    <p>Email: contact@urbanbeats.com</p>
    <p>Phone: +123-456-7890</p>
  </section>

  <button id="scrollTopBtn" onclick="scrollToTop()">↑</button>

  <script>
    function scrollToSection(id) {
      document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
    }

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    const scrollTopBtn = document.getElementById('scrollTopBtn');
    window.onscroll = function () {
      scrollTopBtn.style.display = window.scrollY > 300 ? 'block' : 'none';
    };
  </script>
</body>
</html>
